version: '3.8'

services:
  # ClickHouse - Real-Time OLAP Database for Environmental Time-Series Data
  clickhouse:
    image: clickhouse/clickhouse-server:24.1
    container_name: prithvinet-clickhouse
    ports:
      - "8123:8123"   # HTTP interface
      - "9000:9000"   # Native TCP interface
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./clickhouse/config.xml:/etc/clickhouse-server/config.d/custom.xml:ro
      - ./clickhouse/users.xml:/etc/clickhouse-server/users.d/custom.xml:ro
    environment:
      - CLICKHOUSE_DB=prithvinet
      - CLICKHOUSE_USER=admin
      - CLICKHOUSE_PASSWORD=prithvinet_secure_2024
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8123/ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - prithvinet-network

  # PostgreSQL with PostGIS - Geospatial Data Warehouse
  postgres:
    image: postgis/postgis:16-3.4
    container_name: prithvinet-postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    environment:
      - POSTGRES_DB=prithvinet_geo
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=prithvinet_secure_2024
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d prithvinet_geo"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - prithvinet-network

  # Redis - Caching and Real-Time Data
  redis:
    image: redis:7-alpine
    container_name: prithvinet-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - prithvinet-network

  # ToolJet - Low-Code Frontend Platform (Optional - Can be enabled when needed)
  # tooljet:
  #   image: tooljet/tooljet:latest
  #   container_name: prithvinet-tooljet
  #   ports:
  #     - "3000:3000"
  #   environment:
  #     - TOOLJET_HOST=http://localhost:3000
  #     - PG_HOST=postgres
  #     - PG_DB=tooljet
  #     - PG_USER=admin
  #     - PG_PASSWORD=prithvinet_secure_2024
  #   depends_on:
  #     - postgres
  #   networks:
  #     - prithvinet-network

  # FastAPI Backend
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: prithvinet-backend
    ports:
      - "8000:8000"
    volumes:
      - ../backend:/app
    environment:
      - CLICKHOUSE_HOST=clickhouse
      - CLICKHOUSE_PORT=8123
      - CLICKHOUSE_USER=admin
      - CLICKHOUSE_PASSWORD=prithvinet_secure_2024
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=prithvinet_secure_2024
      - POSTGRES_DB=prithvinet_geo
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      clickhouse:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - prithvinet-network

networks:
  prithvinet-network:
    driver: bridge

volumes:
  clickhouse_data:
  postgres_data:
  redis_data:
